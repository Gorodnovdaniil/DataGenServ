version: '3.8'

services:
  # FastAPI backend для интеграции с n8n и другими системами
  backend:
    build: .
    container_name: datagen-backend
    ports:
      - "8000:8000"
    volumes:
      - ./database.db:/app/database.db
      - ./knowledge:/app/knowledge:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "-m", "backend.main", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  # Streamlit frontend (опционально)
  frontend:
    build: .
    container_name: datagen-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./database.db:/app/database.db
      - ./knowledge:/app/knowledge:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    command: ["streamlit", "run", "front/app.py"]
    depends_on:
      - backend
    restart: unless-stopped
